# ============================================================================
# Azure Pipelines GitHub Release Template
# ============================================================================
#
# Purpose: Create a GitHub release with build artifacts and changelog
# Called by: azure-pipelines.yml (Publication stage)
# Triggers: When PublishGitHub parameter is true
#
# This template:
# 1. Generates a changelog from commits since last release
# 2. Creates a GitHub release with the specified tag
# 3. Uploads build artifacts to the release
# 4. Sets release as pre-release if needed
#
# Requirements:
# - GitHub service connection configured in Azure DevOps
# - Git repository with tags
# - Build artifacts available (optional)
#
# Documentation: See PIPELINE_DOCUMENTATION_INDEX.md for detailed information
# ============================================================================

# ============================================================================
# PARAMETERS
# ============================================================================
# Parameters passed from the main pipeline (azure-pipelines.yml)
# 
# IMPORTANT: Parameters use compile-time syntax ${{ parameters.name }}
# They are evaluated during pipeline parsing, not during job execution
parameters:
  - name: displayName
    type: string
    # Description: Display name for the job in Azure DevOps UI
    # Example: "GitHub Release"
    
  - name: PublishGitHub
    type: boolean
    default: true
    # Description: Whether to publish GitHub release
    # When true: Creates release on GitHub
    # When false: Skips GitHub release creation

# ============================================================================
# JOBS
# ============================================================================
# Job definition for GitHub release
jobs:
  # ========================================================================
  # GitHub Release Job
  # ========================================================================
  # Creates a GitHub release with build artifacts and changelog
  - job: GitHubRelease
    displayName: GitHub Release
    
    # ====================================================================
    # AGENT POOL CONFIGURATION
    # ====================================================================
    # Specifies which build agent to use
    pool:
      name: Default
      # Uses default agent pool
      # Requires: Self-hosted agents with GitHub access
      demands:
        - Agent.OS -equals Linux
    
    # ====================================================================
    # JOB VARIABLES
    # ====================================================================
    # Variables specific to this job
    variables:
      TagVersion: $(Build.BuildNumber)
      # Version tag from build number
      # Set by build jobs (e.g., "1.2.3")
      ChangelogFile: $(System.DefaultWorkingDirectory)/CHANGELOG.md
      # Path to generated changelog file
    
    # ====================================================================
    # JOB STEPS
    # ====================================================================
    # Sequential steps executed in order
    steps:
      # ====================================================================
      # Step 1: Checkout Source Code
      # ====================================================================
      # Checkout source code to access git history for changelog generation
      - checkout: self
        displayName: Checkout source code
        fetchDepth: 0
        # Fetch full history for changelog generation
      
      # ====================================================================
      # Step 2: Debug Output
      # ====================================================================
      # Echo variables for debugging and verification
      # This helps verify that variables were set correctly
      - task: CmdLine@2
        displayName: "Echo variables for debugging"
        inputs:
          script: |
            echo "TagVersion: $(TagVersion)"
            echo "BuildNumber:  $(Build.BuildNumber)"
            echo "SourceBranch: $(Build.SourceBranch)"
            echo "SourceVersion: $(Build.SourceVersion)"
            echo "ChangelogFile: $(ChangelogFile)"
            echo "================================================================"
            git --version
            git log --oneline -10
        # Output:
        # - TagVersion: Version tag for the release
        # - BuildNumber: Azure DevOps build number
        # - Git history for verification
      
      # ====================================================================
      # Step 3: Generate Changelog
      # ====================================================================
      # Generate changelog from commits since last release tag
      - task: CmdLine@2
        displayName: Generate changelog from commits
        inputs:
          script: |
            set -e
            
            echo "Generating changelog..."
            
            # Get the last tag (previous release)
            LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            CURRENT_TAG="v$(TagVersion)"
            
            echo "Last tag: $LAST_TAG"
            echo "Current tag: $CURRENT_TAG"
            echo ""
            
            # Create changelog file
            CHANGELOG="$(ChangelogFile)"
            
            {
              echo "# Changelog for $CURRENT_TAG"
              echo ""
              echo "## Release Information"
              echo "- **Version**: $(TagVersion)"
              echo "- **Release Date**: $(date -u +'%Y-%m-%d')"
              echo "- **Commit**: $(Build.SourceVersion)"
              echo ""
              
              if [ -z "$LAST_TAG" ]; then
                echo "## All Commits"
                echo ""
                git log --pretty=format:"- %h - %s (%%an, %%ar)" --reverse || true
              else
                echo "## Changes since $LAST_TAG"
                echo ""
                
                # Count commits
                COMMIT_COUNT=$(git rev-list --count $LAST_TAG..HEAD)
                echo "**Total commits**: $COMMIT_COUNT"
                echo ""
                
                # Categorize commits
                echo "### Features"
                git log $LAST_TAG..HEAD --grep="feature\|feat\|Feature" --pretty=format:"- %h - %s (%an)" 2>/dev/null || echo "- No new features"
                echo ""
                
                echo "### Bug Fixes"
                git log $LAST_TAG..HEAD --grep="fix\|bugfix\|Bug" --pretty=format:"- %h - %s (%an)" 2>/dev/null || echo "- No bug fixes"
                echo ""
                
                echo "### Other Changes"
                git log $LAST_TAG..HEAD --pretty=format:"- %h - %s (%an)" 2>/dev/null | grep -v -E "feature|feat|Feature|fix|bugfix|Bug" || echo "- No other changes"
              fi
              
              echo ""
              echo "---"
              echo "*Generated by Azure Pipelines*"
            } > "$CHANGELOG"
            
            echo "✓ Changelog generated at: $CHANGELOG"
            echo ""
            echo "Changelog content:"
            echo "================================================================"
            cat "$CHANGELOG"
            echo "================================================================"
      
      # ====================================================================
      # Step 4: Summary
      # ====================================================================
      - task: CmdLine@2
        displayName: Release Summary
        inputs:
          script: |
            REPO_URL=$(git config --get remote.origin.url)
            REPO_NAME=$(basename "$REPO_URL" .git)
            REPO_OWNER=$(echo "$REPO_URL" | sed -E 's/.*[:/]([^/]+)\/.*/\1/')
            GHPAGES_URL="https://$REPO_OWNER.github.io/$REPO_NAME"
            echo "Repository: $REPO_NAME"
            echo "Owner: $REPO_OWNER"
            echo "GitHub Pages: $GHPAGES_URL"
        condition: succeeded()
            
      # ====================================================================
      # Step 5: Create GitHub Release
      # ====================================================================
      # Creates a new release on GitHub with the specified tag and changelog
      # 
      # IMPORTANT NOTES:
      # - Requires GitHub service connection configured in Azure DevOps
      # - Service connection name: "github-packages-sqs"
      # - Requires: GitHub personal access token with repo scope
      # - Only runs if PublishGitHub is true
      - task: GitHubRelease@1
        displayName: "Release to GitHub v$(TagVersion)"
        inputs:
          # GitHub connection configuration
          gitHubConnection: "github-packages-sqs"
          # Repository name (format: owner/repo)
          repositoryName: "$(Build.Repository.Name)"
          
          # Release action
          action: "create"
          # Target commit/branch for the release
          target: "$(Build.SourceVersion)"
          
          # Tag configuration
          tagSource: "userSpecifiedTag"
          # Tag name for the release (e.g., "v1.2.3")
          tag: "$(TagVersion)"
          
          # Release metadata
          title: "v$(TagVersion)"
          # Release title displayed on GitHub
          
          # Release notes - read from generated changelog
          releaseNotesSource: "filePath"
          # Use changelog file as release notes
          releaseNotesFilePath: "$(ChangelogFile)"
          # Path to changelog file
          
          # Release options
          isPreRelease: false
          # Mark as full release (not pre-release)
          
          # Asset upload
          assetUploadMode: "replace"
          # Replace existing assets with same name
          # Assets to upload (build artifacts)
          assets: "$(Build.ArtifactStagingDirectory)/**/*"
          # Uploads all files from artifact staging directory
        condition: and(succeeded(), eq(variables['PublishGitHub'], true), or(eq(variables['Build.SourceBranch'], 'refs/heads/main'), eq(variables['Build.SourceBranch'], 'refs/heads/master')))
        # Only run if:
        # - Previous steps succeeded
        # - Building on main or master branch
        # - PublishGitHub is true
