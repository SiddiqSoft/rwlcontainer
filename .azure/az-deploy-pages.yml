# ============================================================================
# Azure Pipelines GitHub Pages Deployment Template
# ============================================================================
#
# Purpose: Build and deploy Doxygen documentation to GitHub Pages
# Called by: azure-pipelines.yml (Documentation stage)
# Triggers: When on main/master branches
#
# This template:
# 1. Downloads doxygen-awesome-theme
# 2. Installs Doxygen and Graphviz
# 3. Generates Doxygen documentation with awesome theme
# 4. Builds Jekyll site with Doxygen docs
# 5. Deploys to GitHub Pages via gh-pages branch
#
# Requirements:
# - GITHUB_TOKEN variable configured in Azure DevOps pipeline
#   - Must have 'repo' and 'pages' scopes
#   - Can be created at: https://github.com/settings/tokens
# - Git repository with GitHub Pages enabled
# - GitHub Pages configured to deploy from gh-pages branch
#
# Documentation: See PIPELINE_DOCUMENTATION_INDEX.md for detailed information
# ============================================================================

# ============================================================================
# PARAMETERS
# ============================================================================
parameters:
  - name: displayName
    type: string
    default: "Deploy to GitHub Pages"
    # Description: Display name for the job in Azure DevOps UI
    
  - name: DeployPages
    type: boolean
    default: true
    # Description: Whether to deploy to GitHub Pages
    # When true: Deploys documentation to GitHub Pages
    # When false: Skips deployment

# ============================================================================
# JOBS
# ============================================================================
jobs:
  # ========================================================================
  # GitHub Pages Deployment Job
  # ========================================================================
  - job: GitHubPagesDeployment
    displayName: ${{ parameters.displayName }}
    
    # ====================================================================
    # AGENT POOL CONFIGURATION
    # ====================================================================
    pool:
      name: Default
      demands:
        - Agent.OS -equals Linux
    
    # ====================================================================
    # JOB VARIABLES
    # ====================================================================
    variables:
      DoxygenOutputDir: $(System.DefaultWorkingDirectory)/docs/doxygen/html
      SiteOutputDir: $(System.DefaultWorkingDirectory)/_site
      GH_PAGES_BRANCH: gh-pages
      DOXYGEN_AWESOME_THEME_PATH: $(System.DefaultWorkingDirectory)/docs/doxygen-awesome-theme
    
    # ====================================================================
    # JOB STEPS
    # ====================================================================
    steps:
      # ====================================================================
      # Step 1: Checkout Source Code
      # ====================================================================
      - checkout: self
        displayName: Checkout source code
        fetchDepth: 0
        # Fetch full history for proper git operations
      
      # ====================================================================
      # Step 2: Download doxygen-awesome-theme
      # ====================================================================
      - task: CmdLine@2
        displayName: Download doxygen-awesome-theme
        inputs:
          script: |
            set -e
            
            THEME_DIR=$(DOXYGEN_AWESOME_THEME_PATH)
            THEME_REPO="https://github.com/jothepro/doxygen-awesome-css.git"
            
            echo "Downloading doxygen-awesome-theme..."
            git clone --depth 1 "$THEME_REPO" "$THEME_DIR"
            
            echo "✓ Theme downloaded to: $THEME_DIR"
            ls -la "$THEME_DIR"
      
      # ====================================================================
      # Step 3: Validate GitHub Token
      # ====================================================================
      - task: CmdLine@2
        displayName: Validate GitHub token configuration
        inputs:
          script: |
            if [ -z "$(GITHUB_TOKEN)" ]; then
              echo "ERROR: GITHUB_TOKEN is not configured"
              echo "Please configure GITHUB_TOKEN in Azure DevOps pipeline variables"
              echo "Token must have 'repo' and 'pages' scopes"
              exit 1
            fi
            echo "✓ GITHUB_TOKEN is configured"
        condition: and(succeeded(), eq(${{ parameters.DeployPages }}, true))
      
      # ====================================================================
      # Step 4: Update Doxyfile with Theme Configuration
      # ====================================================================
      - task: CmdLine@2
        displayName: Configure Doxyfile with doxygen-awesome-theme
        inputs:
          script: |
            set -e
            
            THEME_DIR=$(DOXYGEN_AWESOME_THEME_PATH)
            DOXYFILE=$(System.DefaultWorkingDirectory)/Doxyfile
            
            echo "Configuring Doxyfile with doxygen-awesome-theme..."
            
            # Verify theme directory exists
            if [ ! -d "$THEME_DIR" ]; then
              echo "ERROR: Theme directory not found at $THEME_DIR"
              exit 1
            fi
            
            # Verify theme files exist
            if [ ! -f "$THEME_DIR/doxygen-awesome.css" ]; then
              echo "ERROR: doxygen-awesome.css not found in $THEME_DIR"
              echo "Contents of $THEME_DIR:"
              ls -la "$THEME_DIR"
              exit 1
            fi
            
            # Update HTML_EXTRA_STYLESHEET to include the awesome theme CSS
            sed -i "s|^HTML_EXTRA_STYLESHEET.*|HTML_EXTRA_STYLESHEET        = $THEME_DIR/doxygen-awesome.css|g" "$DOXYFILE"
            
            # HTML_HEADER and HTML_FOOTER are optional - only update if they exist in theme
            if [ -f "$THEME_DIR/html_header.html" ]; then
              sed -i "s|^HTML_HEADER.*|HTML_HEADER                = $THEME_DIR/html_header.html|g" "$DOXYFILE"
            fi
            
            if [ -f "$THEME_DIR/html_footer.html" ]; then
              sed -i "s|^HTML_FOOTER.*|HTML_FOOTER                = $THEME_DIR/html_footer.html|g" "$DOXYFILE"
            fi
            
            echo "✓ Doxyfile configured with theme"
            echo ""
            echo "Theme configuration:"
            grep -E "HTML_EXTRA_STYLESHEET|HTML_HEADER|HTML_FOOTER" "$DOXYFILE" | head -3
      
      # ====================================================================
      # Step 5: Generate Doxygen Documentation
      # ====================================================================
      - task: CmdLine@2
        displayName: Generate Doxygen documentation
        inputs:
          script: |
            cd $(System.DefaultWorkingDirectory)
            doxygen Doxyfile
            echo "✓ Doxygen documentation generated"
            ls -la docs/doxygen/html/index.html
      
      # ====================================================================
      # Step 6: Setup Ruby and Jekyll
      # We should have ruby installed already.
      # Using the Azure Pipelines step has issues with aarch64 machines!
      # ====================================================================
      - task: CmdLine@2
        displayName: Install Jekyll and dependencies
        inputs:
          script: |
            gem install bundler jekyll jekyll-remote-theme jekyll-github-metadata jekyll-seo-tag
            echo "✓ Jekyll installed"
      
      # ====================================================================
      # VERSION DETECTION
      # ====================================================================
      - task: gitversion-setup@4
        displayName: Install GitVersion
        inputs:
          versionSpec: 6.x
          preferLatestVersion: true

      - task: gitversion-execute@4
        displayName: Determine Version
        name: version_step
        inputs:
          useConfigFile: true
          configFilePath: GitVersion.yml
          updateBuildNumber: true

      - bash: |
          echo "$(GITVERSION_MAJORMINORPATCH)" > TagVersion.txt
          echo "$(GITVERSION_FULLSEMVER)" > FullSemVer.txt
          echo "Version: $(GITVERSION_MAJORMINORPATCH)"
          echo "Full SemVer: $(GITVERSION_FULLSEMVER)"
        displayName: Save Version Information
      - bash: |
          # Substitute the SemVer into PROJECT_NUMBER inside the Doxyfile
          sed -i "s/^PROJECT_NUMBER[[:space:]]*=.*/PROJECT_NUMBER = $(GITVERSION_MAJORMINORPATCH)/" Doxyfile
          
          echo "Updated Doxyfile to version $(GITVERSION_MAJORMINORPATCH)"
          cat Doxyfile | grep PROJECT_NUMBER
        displayName: 'Update Doxyfile with GitVersion'
      
      # ====================================================================
      # Step 7: Build Jekyll Site
      # ====================================================================
      - task: CmdLine@2
        displayName: Build Jekyll site with Doxygen docs
        inputs:
          script: |
            bundle install
            which jekyll || { echo "ERROR: Jekyll is not installed"; exit 1; }
            echo "Found jekyll version: $(jekyll -v)"
            echo "=========================================="
            echo "Building Jekyll site to $(SiteOutputDir).."
            echo "=========================================="
            cd $(System.DefaultWorkingDirectory)/docs
            jekyll build -d $(SiteOutputDir)
            echo "✓ Jekyll site built successfully"
            echo "Site location: $(SiteOutputDir)"
            ls -la $(SiteOutputDir)
      
      # ====================================================================
      # Step 8: Configure Git with GitHub Token
      # ====================================================================
      - task: CmdLine@2
        displayName: Configure Git authentication
        inputs:
          script: |
            git config --global user.email "$(GITHUB_USER)"
            git config --global user.name "Azure Pipelines Bot"
            
            # Configure git to use token for authentication
            git config --global url."https://$(GITHUB_TOKEN)@github.com/".insteadOf "https://github.com/"
            
            echo "✓ Git configured for GitHub authentication"
        env:
          GITHUB_TOKEN: $(GITHUB_TOKEN)
          GITHUB_USER: $(GITHUB_USER)
        condition: and(succeeded(), eq(${{ parameters.DeployPages }}, true))
      
      # ====================================================================
      # Step 9: Deploy to GitHub Pages (gh-pages branch)
      # ====================================================================
      - task: CmdLine@2
        displayName: Deploy to GitHub Pages
        inputs:
          script: |
            set -e
            
            # Get repository information
            REPO_URL=$(git config --get remote.origin.url)
            REPO_NAME=$(basename "$REPO_URL" .git)
            REPO_OWNER=$(echo "$REPO_URL" | sed -E 's/.*[:/]([^/]+)\/.*/\1/')
            
            echo "=========================================="
            echo "GitHub Pages Deployment"
            echo "=========================================="
            echo "Repository: $REPO_OWNER/$REPO_NAME"
            echo "Branch: $(GH_PAGES_BRANCH)"
            echo "Build: $(Build.BuildNumber)"
            echo "Source: $(Build.SourceBranch)"
            echo "=========================================="
            
            # Create a temporary directory for the gh-pages branch
            TEMP_DIR=$(mktemp -d)
            echo "Temporary directory: $TEMP_DIR"
            cd "$TEMP_DIR"
            
            # Clone the repository with gh-pages branch
            echo "Cloning gh-pages branch..."
            git clone --branch $(GH_PAGES_BRANCH) --single-branch "$REPO_URL" . 2>&1 | grep -v "warning:"
            
            # Remove all existing files except .git
            echo "Cleaning old files..."
            find . -not -path './.git*' -type f -delete
            find . -not -path './.git*' -type d -empty -delete
            
            # Copy the built site
            echo "Copying new site files..."
            cp -r $(SiteOutputDir)/* .
            
            # Add all files
            git add -A
            
            # Check if there are changes to commit
            if git diff --cached --quiet; then
              echo "✓ No changes to deploy"
            else
              echo "Committing changes..."
              git commit -m "Deploy documentation from Azure Pipelines build $(Build.BuildNumber)  Source branch: $(Build.SourceBranch)  Build URL: $(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)"
              
              echo "Pushing to gh-pages branch..."
              git push origin $(GH_PAGES_BRANCH)
              
              echo "=========================================="
              echo "✓ Successfully deployed to GitHub Pages"
              echo "=========================================="
              echo "Site URL: https://$REPO_OWNER.github.io/$REPO_NAME"
            fi
        env:
          GITHUB_TOKEN: $(GITHUB_TOKEN)
        condition: or(eq(${{ parameters.DeployPages }}, true),
                       or(eq(variables['Build.SourceBranch'], 'refs/heads/main'),
                          eq(variables['Build.SourceBranch'], 'refs/heads/master')
                         )
                      )
      
      # ====================================================================
      # Step 10: Publish Artifact
      # ====================================================================
      - task: PublishBuildArtifacts@1
        displayName: Publish site artifact
        inputs:
          PathtoPublish: $(SiteOutputDir)
          ArtifactName: github-pages-site
          publishLocation: Container
        condition: succeeded()
      
      # ====================================================================
      # Step 11: Summary
      # ====================================================================
      - task: CmdLine@2
        displayName: Deployment Summary
        inputs:
          script: |
            echo "=========================================="
            echo "Documentation Deployment Summary"
            echo "=========================================="
            echo "Build Number: $(Build.BuildNumber)"
            echo "Source Branch: $(Build.SourceBranch)"
            echo "Deployment Status: SUCCESS"
            echo "Theme: doxygen-awesome-css"
            echo "=========================================="
            echo ""
            echo "Documentation is now available at:"
            REPO_URL=$(git config --get remote.origin.url)
            REPO_NAME=$(basename "$REPO_URL" .git)
            REPO_OWNER=$(echo "$REPO_URL" | sed -E 's/.*[:/]([^/]+)\/.*/\1/')
            echo "https://$REPO_OWNER.github.io/$REPO_NAME"
            echo ""
        condition: succeeded()
