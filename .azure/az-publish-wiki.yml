# ============================================================================
# Azure Pipelines Wiki Publication Template
# ============================================================================
#
# Purpose: Publish wiki documentation to GitHub Wiki
# Called by: azure-pipelines.yml (Publication stage)
# Triggers: When PublishWiki parameter is true
#
# This template:
# 1. Clones the GitHub Wiki repository
# 2. Syncs wiki files from docs/wiki directory
# 3. Commits and pushes changes to GitHub Wiki
#
# Requirements:
# - GitHub service connection configured in Azure DevOps
# - Git repository with wiki enabled
# - Wiki files in docs/wiki directory
#
# Documentation: See PIPELINE_DOCUMENTATION_INDEX.md for detailed information
# ============================================================================

# ============================================================================
# PARAMETERS
# ============================================================================
# Parameters passed from the main pipeline (azure-pipelines.yml)
# 
# IMPORTANT: Parameters use compile-time syntax ${{ parameters.name }}
# They are evaluated during pipeline parsing, not during job execution
parameters:
  - name: displayName
    type: string
    # Description: Display name for the job in Azure DevOps UI
    # Example: "Wiki Publication"
    
  - name: PublishWiki
    type: boolean
    default: true
    # Description: Whether to publish wiki
    # When true: Publishes wiki to GitHub
    # When false: Skips wiki publication

# ============================================================================
# JOBS
# ============================================================================
# Job definition for wiki publication
jobs:
  # ========================================================================
  # Wiki Publication Job
  # ========================================================================
  # Publishes wiki documentation to GitHub Wiki
  - job: WikiPublication
    displayName: Wiki Publication
    
    # ====================================================================
    # AGENT POOL CONFIGURATION
    # ====================================================================
    # Specifies which build agent to use
    pool:
      name: Default
      # Uses default agent pool
      # Requires: Git and GitHub access
    
    # ====================================================================
    # JOB VARIABLES
    # ====================================================================
    # Variables specific to this job
    variables:
      WikiSourceDir: $(System.DefaultWorkingDirectory)/docs/wiki
      # Source directory containing wiki files
      WikiCloneDir: $(System.DefaultWorkingDirectory)/wiki-clone
      # Directory to clone GitHub Wiki into
      RepositoryName: $(Build.Repository.Name)
      # Repository name (format: owner/repo)
    
    # ====================================================================
    # JOB STEPS
    # ====================================================================
    # Sequential steps executed in order
    steps:
      # ====================================================================
      # Step 1: Checkout Source Code
      # ====================================================================
      # Checkout the source repository to access wiki files
      - checkout: self
        displayName: "Checkout source repository"
        # Checks out the source code
        # Needed to access docs/wiki directory
      
      # ====================================================================
      # Step 2: Debug Output
      # ====================================================================
      # Echo variables for debugging and verification
      - task: CmdLine@2
        displayName: "Echo variables for debugging"
        inputs:
          script: |
            echo "Repository: $(RepositoryName)"
            echo "Wiki Source: $(WikiSourceDir)"
            echo "Wiki Clone: $(WikiCloneDir)"
            echo "Build Number: $(Build.BuildNumber)"
            echo "Source Version: $(Build.SourceVersion)"
            echo "Source Branch: $(Build.SourceBranch)"
            echo "----------------------------------------------------------------"
        # Output:
        # - Repository name
        # - Wiki source and clone directories
        # - Build metadata
      
      # ====================================================================
      # Step 3: Configure Git
      # ====================================================================
      # Configure git user for commits
      - task: CmdLine@2
        displayName: "Configure Git"
        inputs:
          script: |
            git config --global user.email "azure-pipelines@siddiqsoft.com"
            git config --global user.name "Azure Pipelines"
        # Configures git user for wiki commits
        # Email and name used for commit attribution
      
      # ====================================================================
      # Step 4: Clone GitHub Wiki Repository
      # ====================================================================
      # Clone the GitHub Wiki repository
      - task: CmdLine@2
        displayName: "Clone GitHub Wiki"
        inputs:
          script: |
            # Extract owner and repo from repository name (format: owner/repo)
            REPO_FULL=$(Build.Repository.Name)
            WIKI_URL="https://github.com/${REPO_FULL}.wiki.git"
            
            echo "Cloning wiki from: ${WIKI_URL}"
            git clone "${WIKI_URL}" "$(WikiCloneDir)" || {
              echo "Wiki repository does not exist yet, creating empty directory"
              mkdir -p "$(WikiCloneDir)"
            }
        # Clones the GitHub Wiki repository
        # If wiki doesn't exist, creates empty directory
      
      # ====================================================================
      # Step 5: Sync Wiki Files
      # ====================================================================
      # Copy wiki files from source to wiki clone directory
      - task: CmdLine@2
        displayName: "Sync wiki files"
        inputs:
          script: |
            # Copy all markdown files from source to wiki directory
            cp -v $(WikiSourceDir)/*.md "$(WikiCloneDir)/" || true
            
            # List files in wiki directory for verification
            echo "Files in wiki directory:"
            ls -la "$(WikiCloneDir)/"
        # Copies all markdown files from docs/wiki to wiki clone directory
        # Preserves existing files not in source
      
      # ====================================================================
      # Step 6: Commit and Push Wiki Changes
      # ====================================================================
      # Commit and push changes to GitHub Wiki
      - task: CmdLine@2
        displayName: "Commit and push wiki changes"
        inputs:
          script: |
            cd "$(WikiCloneDir)"
            
            # Check if there are changes
            if git diff --quiet && git diff --cached --quiet; then
              echo "No changes to wiki, skipping commit"
              exit 0
            fi
            
            # Add all changes
            git add -A
            
            # Commit changes
            git commit -m "Update wiki from build $(Build.BuildNumber)" || {
              echo "No changes to commit"
              exit 0
            }
            
            # Push changes to GitHub Wiki
            git push origin master || {
              echo "Failed to push wiki changes"
              exit 1
            }
        condition: and(succeeded(), eq(variables['PublishWiki'], true), or(eq(variables['Build.SourceBranch'], 'refs/heads/main'), eq(variables['Build.SourceBranch'], 'refs/heads/master')))
        # Only run if:
        # - Previous steps succeeded
        # - PublishWiki is true
        # - Building on main or master branch
