# ============================================================================
# Azure Pipelines GitHub Pages Publication Template
# ============================================================================
#
# Purpose: Publish documentation to GitHub Pages
# Called by: azure-pipelines.yml (Publication stage)
# Triggers: When PublishPages parameter is true
#
# This template:
# 1. Clones the GitHub Pages repository (gh-pages branch)
# 2. Copies documentation files from docs/ directory
# 3. Commits and pushes changes to GitHub Pages
#
# Requirements:
# - GitHub service connection configured in Azure DevOps
# - Git repository with gh-pages branch enabled
# - Documentation files in docs/ directory
#
# Documentation: See PIPELINE_DOCUMENTATION_INDEX.md for detailed information
# ============================================================================

# ============================================================================
# PARAMETERS
# ============================================================================
# Parameters passed from the main pipeline (azure-pipelines.yml)
# 
# IMPORTANT: Parameters use compile-time syntax ${{ parameters.name }}
# They are evaluated during pipeline parsing, not during job execution
parameters:
  - name: displayName
    type: string
    # Description: Display name for the job in Azure DevOps UI
    # Example: "GitHub Pages Publication"
    
  - name: PublishPages
    type: boolean
    default: true
    # Description: Whether to publish to GitHub Pages
    # When true: Publishes documentation to GitHub Pages
    # When false: Skips GitHub Pages publication

# ============================================================================
# JOBS
# ============================================================================
# Job definition for GitHub Pages publication
jobs:
  # ========================================================================
  # GitHub Pages Publication Job
  # ========================================================================
  # Publishes documentation to GitHub Pages
  - job: GitHubPagesPublication
    displayName: GitHub Pages Publication
    
    # ====================================================================
    # AGENT POOL CONFIGURATION
    # ====================================================================
    # Specifies which build agent to use
    pool:
      name: Default
      # Uses default agent pool
      # Requires: Git and GitHub access
    
    # ====================================================================
    # JOB VARIABLES
    # ====================================================================
    # Variables specific to this job
    variables:
      DocsSourceDir: $(System.DefaultWorkingDirectory)/docs
      # Source directory containing documentation files
      PagesCloneDir: $(System.DefaultWorkingDirectory)/pages-clone
      # Directory to clone GitHub Pages into
      RepositoryName: $(Build.Repository.Name)
      # Repository name (format: owner/repo)
    
    # ====================================================================
    # JOB STEPS
    # ====================================================================
    # Sequential steps executed in order
    steps:
      # ====================================================================
      # Step 1: Checkout Source Code
      # ====================================================================
      # Checkout the source repository to access documentation files
      - checkout: self
        displayName: "Checkout source repository"
        # Checks out the source code
        # Needed to access docs/ directory
      
      # ====================================================================
      # Step 2: Debug Output
      # ====================================================================
      # Echo variables for debugging and verification
      - task: CmdLine@2
        displayName: "Echo variables for debugging"
        inputs:
          script: |
            echo "Repository: $(RepositoryName)"
            echo "Docs Source: $(DocsSourceDir)"
            echo "Pages Clone: $(PagesCloneDir)"
            echo "Build Number: $(Build.BuildNumber)"
            echo "Source Version: $(Build.SourceVersion)"
            echo "Source Branch: $(Build.SourceBranch)"
            echo "================================================================"
        # Output:
        # - Repository name
        # - Docs source and pages clone directories
        # - Build metadata
      
      # ====================================================================
      # Step 3: Configure Git
      # ====================================================================
      # Configure git user for commits
      - task: CmdLine@2
        displayName: "Configure Git"
        inputs:
          script: |
            git config --global user.email "azure-pipelines@siddiqsoft.com"
            git config --global user.name "Azure Pipelines"
        # Configures git user for pages commits
        # Email and name used for commit attribution
      
      # ====================================================================
      # Step 4: Clone GitHub Pages Repository
      # ====================================================================
      # Clone the GitHub Pages repository (gh-pages branch)
      - task: CmdLine@2
        displayName: "Clone GitHub Pages repository"
        inputs:
          script: |
            # Extract owner and repo from repository name (format: owner/repo)
            REPO_FULL=$(Build.Repository.Name)
            PAGES_URL="https://github.com/${REPO_FULL}.git"
            
            echo "Cloning pages from: ${PAGES_URL}"
            git clone --branch gh-pages "${PAGES_URL}" "$(PagesCloneDir)" 2>/dev/null || {
              echo "gh-pages branch does not exist, creating new repository"
              mkdir -p "$(PagesCloneDir)"
              cd "$(PagesCloneDir)"
              git init
              git remote add origin "${PAGES_URL}"
            }
        # Clones the GitHub Pages repository (gh-pages branch)
        # If gh-pages doesn't exist, creates empty directory
      
      # ====================================================================
      # Step 5: Copy Documentation Files
      # ====================================================================
      # Copy documentation files to pages directory
      - task: CmdLine@2
        displayName: "Copy documentation files"
        inputs:
          script: |
            # Copy index.html
            if [ -f "$(DocsSourceDir)/index.html" ]; then
              cp -v "$(DocsSourceDir)/index.html" "$(PagesCloneDir)/"
              echo "Copied index.html"
            fi
            
            # Copy wiki markdown files
            if [ -d "$(DocsSourceDir)/wiki" ]; then
              mkdir -p "$(PagesCloneDir)/wiki"
              cp -v "$(DocsSourceDir)/wiki/"*.md "$(PagesCloneDir)/wiki/" || true
              echo "Copied wiki files"
            fi
            
            # Copy API documentation
            if [ -f "$(DocsSourceDir)/API.md" ]; then
              cp -v "$(DocsSourceDir)/API.md" "$(PagesCloneDir)/"
              echo "Copied API.md"
            fi
            
            # Copy Tests documentation
            if [ -f "$(DocsSourceDir)/Tests.md" ]; then
              cp -v "$(DocsSourceDir)/Tests.md" "$(PagesCloneDir)/"
              echo "Copied Tests.md"
            fi
            
            # List files in pages directory for verification
            echo "Files in pages directory:"
            ls -la "$(PagesCloneDir)/"
        # Copies documentation files from source to pages directory
        # Preserves existing files not in source
      
      # ====================================================================
      # Step 6: Create CNAME file (optional)
      # ====================================================================
      # Create CNAME file for custom domain (if needed)
      - task: CmdLine@2
        displayName: "Create CNAME file (optional)"
        inputs:
          script: |
            # Uncomment and modify if using custom domain
            # echo "docs.example.com" > "$(PagesCloneDir)/CNAME"
            
            # For now, just verify the directory structure
            echo "Directory structure:"
            find "$(PagesCloneDir)" -type f -name "*.html" -o -name "*.md" | head -20
        # Creates CNAME file for custom domain (optional)
        # Uncomment and modify if using custom domain
      
      # ====================================================================
      # Step 7: Commit and Push Pages Changes
      # ====================================================================
      # Commit and push changes to GitHub Pages
      - task: CmdLine@2
        displayName: "Commit and push pages changes"
        inputs:
          script: |
            cd "$(PagesCloneDir)"
            
            # Check if there are changes
            if git diff --quiet && git diff --cached --quiet; then
              echo "No changes to pages, skipping commit"
              exit 0
            fi
            
            # Add all changes
            git add -A
            
            # Commit changes
            git commit -m "Update documentation from build $(Build.BuildNumber)" || {
              echo "No changes to commit"
              exit 0
            }
            
            # Push changes to GitHub Pages (gh-pages branch)
            git push origin gh-pages || {
              echo "Failed to push pages changes"
              exit 1
            }
        condition: and(succeeded(), eq(variables['PublishPages'], true), or(eq(variables['Build.SourceBranch'], 'refs/heads/main'), eq(variables['Build.SourceBranch'], 'refs/heads/master')))
        # Only run if:
        # - Previous steps succeeded
        # - PublishPages is true
        # - Building on main or master branch
